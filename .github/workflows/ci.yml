name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest (+ coverage gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run pytest with coverage gate (88% on app/game/)
        run: uv run pytest -q --cov=app/game --cov-fail-under=88

  lint-python:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install ruff
        run: uv sync --only-group dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format check
        run: uv run ruff format --check .

  type-check:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-groups
      - name: mypy
        run: uv run mypy

  lint-frontend:
    name: prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: prettier check
        run: npx --yes prettier@3.3.3 --check 'static/**/*.{js,css,html}' '*.md' 'docs/**/*.md' 'CONTRIBUTING.md' 'README.md'

  test-frontend:
    name: vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install JS dev deps
        run: npm install --no-audit --no-fund
      - name: Run vitest
        run: npx vitest run

  web-export:
    # Baut den Godot-Web-Build (HTML5/WASM) als Deploy-Artifact.
    # Laeuft auf jedem Push/PR — Godot + Web-Templates sind gecached, der
    # eigentliche Export ist mit Cache-Hit ~30s, ohne Cache ~3min (Templates
    # sind ~250 MB Download). Artifact wird vom deploy-Job konsumiert,
    # sodass EC2 keine Godot-Toolchain installiert haben muss.
    name: godot web-export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-4.6-stable-linux-x86_64
      - name: Install Godot 4.6 (cache miss)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin && cd ~/godot-bin
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip"
          unzip -q godot.zip && rm godot.zip
          chmod +x Godot_v4.6-stable_linux.x86_64
      - name: Add godot to PATH
        run: |
          mkdir -p ~/.local/bin
          ln -sf ~/godot-bin/Godot_v4.6-stable_linux.x86_64 ~/.local/bin/godot
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cache Godot Web-Export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/4.6.stable
          key: godot-export-templates-4.6-stable
      - name: Install Web-Export templates (cache miss)
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          # .tpz ist ein Zip-Archiv; entpackt eine "templates/"-Wurzel,
          # die Godot 4.6 unter "4.6.stable/" erwartet.
          mkdir -p ~/.local/share/godot/export_templates
          cd ~/.local/share/godot/export_templates
          curl -fL -o tpl.tpz "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz"
          unzip -q tpl.tpz
          mv templates 4.6.stable
          rm tpl.tpz
      - name: Build Godot Web export (release)
        run: ./scripts/godot-web-export.sh
      - name: Verify export output
        run: |
          test -f godot-3d/exports/index.html
          test -f godot-3d/exports/index.wasm
          test -f godot-3d/exports/index.pck
          ls -lh godot-3d/exports/
      - name: Upload Web-Export artifact
        uses: actions/upload-artifact@v7
        with:
          name: godot-web-export
          path: godot-3d/exports/
          retention-days: 7

  deploy:
    name: deploy to EC2
    needs: [test, lint-python, type-check, lint-frontend, test-frontend, web-export]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot Web-Export artifact
        uses: actions/download-artifact@v4
        with:
          name: godot-web-export
          path: godot-3d/exports/

      - name: Check secrets are configured
        id: secret-check
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          if [[ -z "$EC2_SSH_KEY" || -z "$EC2_HOST" ]]; then
            echo "secrets-missing=true" >> "$GITHUB_OUTPUT"
            echo "::warning ::Skipping deploy — set EC2_SSH_KEY and EC2_HOST repo secrets to enable."
          else
            echo "secrets-missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up SSH key
        if: steps.secret-check.outputs.secrets-missing == 'false'
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.EC2_SSH_KEY }}" > "$HOME/.ssh/mcm-deploy.pem"
          chmod 400 "$HOME/.ssh/mcm-deploy.pem"
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> "$HOME/.ssh/known_hosts" 2>/dev/null

      - name: Run deploy script
        if: steps.secret-check.outputs.secrets-missing == 'false'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
        run: |
          chmod +x scripts/deploy.sh
          SSH_KEY="$HOME/.ssh/mcm-deploy.pem" ./scripts/deploy.sh
